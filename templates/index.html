{% extends "base.html" %}

{% block title %} {% endblock %}

{% block css %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
{% endblock %}


{% block content %}

<div id="index">
    <h1>Bienvenu sur mon Blog</h1>
    {% if current_user.is_authenticated %}
        <div class="nouvel_articles">
            <a href="{{ url_for('nouvel_article') }}">Créer un nouvel article</a>
        </div>
    {% endif %}
</div>

{% endblock %}
